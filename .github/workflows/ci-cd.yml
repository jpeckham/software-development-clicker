name: CI/CD

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser test runtime
        run: npx playwright install chromium

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy to itch.io
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    env:
      BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
      ITCH_TARGET: jheredparnell/software-development-clicker:html5
      USER_VERSION: v0.1.${{ github.run_number }}-${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser test runtime
        run: npx playwright install chromium

      - name: Run tests
        run: npm test

      - name: Install butler
        run: |
          curl -L https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default -o butler.zip
          unzip -q butler.zip
          chmod +x butler
          ./butler -V

      - name: Deploy HTML5 game to itch.io
        shell: pwsh
        run: |
          ./scripts/Publish-ItchGame.ps1 -Publish -ButlerPath ./butler -Target "$env:ITCH_TARGET" -UserVersion "$env:USER_VERSION"
